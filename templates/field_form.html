{% extends 'base.html' %}

{% block content %}
{% if edit_mode %}
    <h2>Edit Field</h2>
    <p class="section-subtext">Update this farm field record.</p>
{% else %}
    <h2>Add Field</h2>
    <p class="section-subtext">Create a new farm field record.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">
        {% if edit_mode %}Update Field{% else %}Save Field{% endif %}
    </button>
</form>
{% endblock %}
